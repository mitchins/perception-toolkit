name: perception-bench-py312
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip>=24
  - pip:
      # Core inference stack pinned for the local benchmark harness.
      # Python 3.12 avoids Moondream's Python 3.9 remote-code syntax issue.
      # transformers 4.54.1 and torch 2.9.0 are the combination already exercised locally.
      - torch==2.9.0
      - torchvision==0.24.0
      - transformers==4.54.1
      - accelerate>=1.10,<2
      - pillow>=11,<12
      - huggingface-hub>=0.34,<1
      - safetensors>=0.5,<1
      - tokenizers>=0.21,<0.22

      # Sidecar/runtime deps so the same env can run the API if needed.
      - fastapi>=0.115,<1
      - uvicorn[standard]>=0.30,<1
      - pydantic>=2.8,<3
      - pyyaml>=6,<7
      - httpx>=0.27,<1
      - python-multipart>=0.0.9,<1

      # Vision/model helpers used by Florence and likely future backends.
      - einops>=0.8,<1
      - timm>=1.0,<2
      - sentencepiece>=0.2,<1
      - open-clip-torch>=2.24,<3
