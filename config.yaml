# ─────────────────────────────────────────────────────────────────────
# Perception Sandbox — Sidecar Configuration
# ─────────────────────────────────────────────────────────────────────
#
# This file configures the perception sidecar backends.
# All heavy inference settings live here — not in Open WebUI.
#
# Override any value with environment variables:
#   PERCEPTION_FLORENCE_ENABLED=true
#   PERCEPTION_FLORENCE_MODEL_ID=microsoft/Florence-2-large
#   PERCEPTION_FLORENCE_DEVICE=auto   # auto, mps, cpu, cuda:0, etc.
#   PERCEPTION_WD14_ENABLED=true
#   etc.
# ─────────────────────────────────────────────────────────────────────

backends:
  florence:
    enabled: true
    model_id: microsoft/Florence-2-base
    device: auto
    general_task: detailed
    max_new_tokens: 256
    num_beams: 1

  wd14:
    enabled: false
    model_id: SmilingWolf/wd-v1-4-convnextv2
    threshold_default: 0.35
    device: auto

  ocr:
    enabled: true
    score_threshold_default: 0.50
    det_lang: multi
    rec_lang: ch
    rec_version: PP-OCRv5

  detector:
    enabled: false
    model_id: yolo11n.pt
    confidence_threshold_default: 0.35
    iou_threshold_default: 0.45
    max_detections: 50
    device: auto

  classifier:
    enabled: false
    model_path: /models/custom_classifier.onnx
    threshold_default: 0.60
    device: auto

sandbox:
  base_path: /tmp/perception
  ttl_seconds: 3600

# Sidecar server settings
host: "0.0.0.0"
port: 8200
